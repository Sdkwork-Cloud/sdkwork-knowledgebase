[workspace]

[package]
name = "sdkwork-knowledgebase-backend-sdk-generated-rust"
version = "0.1.0"
edition = "2021"
description = "sdkwork-knowledgebase-backend-sdk SDK"
license = "MIT"
authors = ["SDKWork Team"]

[lib]
name = "sdkwork_knowledgebase_backend_sdk_generated_rust"
path = "src/lib.rs"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
http = "1.0"

[dev-dependencies]
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }

mode = "split"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "0.0.0.0:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-iam-app-api"
workspace = "sdkwork-appbase"
sdkFamily = "sdkwork-iam-app-sdk"
apiAuthority = "sdkwork-iam-app-api"
surface = "app"
apiPrefix = "/app/v3/api"
runtimeMode = "split-or-embedded"
sameOriginAllowed = true
executableExport = "sdkwork_router_iam_app_api::build_sdkwork_iam_app_api_router"
cargoFeature = "foundation-appbase"
cargoDependency = "sdkwork_router_iam_app_api"
coverage = "appbase-iam-routes"
requiredBaseUrlKey = "SDKWORK_APPBASE_APP_API_BASE_URL"

[[dependencySurfaces]]
serviceId = "sdkwork-knowledgebase-app-api"
workspace = "sdkwork-knowledgebase"
sdkFamily = "sdkwork-knowledgebase-app-sdk"
apiAuthority = "sdkwork-knowledgebase-app-api"
surface = "app"
apiPrefix = "/app/v3/api/knowledge"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_KNOWLEDGEBASE_APPLICATION_PUBLIC_HTTP_URL"
coverage = "knowledgebase-app-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-knowledgebase-backend-api"
workspace = "sdkwork-knowledgebase"
sdkFamily = "sdkwork-knowledgebase-backend-sdk"
apiAuthority = "sdkwork-knowledgebase-backend-api"
surface = "backend"
apiPrefix = "/backend/v3/api/knowledge"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_KNOWLEDGEBASE_APPLICATION_BACKEND_HTTP_URL"
coverage = "knowledgebase-backend-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-knowledgebase-open-api"
workspace = "sdkwork-knowledgebase"
sdkFamily = "sdkwork-knowledgebase-sdk"
apiAuthority = "sdkwork-knowledgebase-open-api"
surface = "open"
apiPrefix = "/knowledge/v3/api"
runtimeMode = "split"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_KNOWLEDGEBASE_APPLICATION_OPEN_HTTP_URL"
coverage = "knowledgebase-open-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-knowledgebase-app-api"
baseUrl = "http://sdkwork-knowledgebase-app-api:18081"

[[upstreams]]
serviceId = "sdkwork-knowledgebase-backend-api"
baseUrl = "http://sdkwork-knowledgebase-backend-api:18082"

[[upstreams]]
serviceId = "sdkwork-knowledgebase-open-api"
baseUrl = "http://sdkwork-knowledgebase-open-api:18083"

[cors]
allowAnyOrigin = false
allowedOrigins = [
  "https://api.sdkwork.com",
  "https://knowledgebase.sdkwork.com",
  "https://knowledgebase-admin.sdkwork.com",
  "https://knowledge.sdkwork.com",
]

[request]
maxBodyBytes = 33554432
timeoutMs = 120000

[readiness]
enabled = true
checkUpstreams = true
timeoutMs = 3000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = true
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[security]
allowedHosts = ["api.sdkwork.com", "knowledgebase.sdkwork.com", "knowledgebase-admin.sdkwork.com", "knowledge.sdkwork.com"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 2048

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = true
maxAttempts = 2
retryStatuses = [502, 503, 504]
retryBackoffMs = 100
circuitBreakerEnabled = true
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1

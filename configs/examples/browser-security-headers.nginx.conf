# Static browser bundle security headers for sdkwork-knowledgebase-pc production hosting.
# Keep aligned with apps/sdkwork-knowledgebase-pc/config/browser/securityHeaders.ts

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; frame-src 'self' https: blob:; connect-src 'self' https:; worker-src 'self' blob:" always;

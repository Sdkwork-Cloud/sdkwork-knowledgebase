apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sdkwork-knowledgebase-app-api
  labels:
    app: sdkwork-knowledgebase
    component: app-api
    release: prometheus
spec:
  selector:
    matchLabels:
      app: sdkwork-knowledgebase
      component: app-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---

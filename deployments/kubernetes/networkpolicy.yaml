apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sdkwork-knowledgebase-network-policy
  labels:
    app: sdkwork-knowledgebase
spec:
  podSelector:
    matchLabels:
      app: sdkwork-knowledgebase
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public ingress (API surfaces served on port 8080).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus scraping on the API metrics port (8080).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
    # Worker health and metrics scraping on port 18085.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 18085
    # Same-namespace application service traffic for API and worker coordination.
    - from:
        - podSelector:
            matchLabels:
              app: sdkwork-knowledgebase
        - podSelector:
            matchLabels:
              app: sdkwork-api-cloud-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 18085
  egress:
    # DNS resolution (kube-system CoreDNS).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL primary/replica in the database namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
      ports:
        - protocol: TCP
          port: 5432
    # Redis for distributed rate limiting and outbox claim coordination
    # in the cloud deployment profile.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redis
      ports:
        - protocol: TCP
          port: 6379
    # OpenTelemetry OTLP collector (gRPC 4317, HTTP 4318).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Outbound HTTPS for knowledge ingestion sources, OAuth providers,
    # WeChat Open Platform APIs, SearXNG public web search, and Drive storage.
    # Restricted to port 443 to enforce TLS-protected egress.
    - to:
        # Standard NetworkPolicy cannot express FQDNs. This permits only
        # TLS egress; production clusters should additionally enforce an
        # egress gateway/FQDN policy for provider allow-lists.
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Same-namespace application service egress.
    - to:
        - podSelector:
            matchLabels:
              app: sdkwork-knowledgebase
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 18085

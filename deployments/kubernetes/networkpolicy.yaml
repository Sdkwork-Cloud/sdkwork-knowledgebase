apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sdkwork-knowledgebase-api-ingress
  labels:
    app: sdkwork-knowledgebase
spec:
  podSelector:
    matchLabels:
      app: sdkwork-knowledgebase
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 18085

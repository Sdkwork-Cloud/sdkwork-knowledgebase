apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-knowledgebase-worker
  labels:
    app: sdkwork-knowledgebase
    component: background-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sdkwork-knowledgebase
      component: background-worker
  template:
    metadata:
      labels:
        app: sdkwork-knowledgebase
        component: background-worker
    spec:
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: registry.sdkwork.com/apps/sdkwork-knowledgebase/worker:0.1.0
          ports:
            - name: health
              containerPort: 18085
              protocol: TCP
          env:
            - name: SDKWORK_KNOWLEDGEBASE_ENVIRONMENT
              value: production
            - name: SDKWORK_KNOWLEDGEBASE_WORKER_HEALTH_ADDR
              value: "0.0.0.0:18085"
            - name: SDKWORK_KNOWLEDGEBASE_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: SDKWORK_KNOWLEDGEBASE_WORKER_INGESTION_JOB_LEASE_SECONDS
              value: "300"
            - name: SDKWORK_NODE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_INTERNAL_API_INGRESS_TOKEN_FILE
              value: /run/secrets/sdkwork/drive-internal-api-ingress-token
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_CALLBACK_URL
              value: https://knowledgebase.sdkwork.com/internal/v3/api/knowledgebase/drive_events
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_SIGNING_SECRET_FILE
              value: /run/secrets/sdkwork/drive-event-signing/current
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_CHANNEL_TTL_SECONDS
              value: "86400"
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_CALLER_APP_ID
              value: sdkwork-drive
          envFrom:
            - secretRef:
                name: sdkwork-knowledgebase-runtime
            - configMapRef:
                name: sdkwork-knowledgebase-topology
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /livez
              port: 18085
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18085
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: drive-internal-api-ingress-token
              mountPath: /run/secrets/sdkwork/drive-internal-api-ingress-token
              subPath: ingress-token
              readOnly: true
            - name: drive-event-signing-master
              mountPath: /run/secrets/sdkwork/drive-event-signing
              readOnly: true
      volumes:
        - name: drive-internal-api-ingress-token
          secret:
            secretName: sdkwork-knowledgebase-drive-internal-api
        - name: drive-event-signing-master
          secret:
            secretName: sdkwork-knowledgebase-drive-events
---
apiVersion: v1
kind: Service
metadata:
  name: sdkwork-knowledgebase-worker
  labels:
    app: sdkwork-knowledgebase
    component: background-worker
spec:
  selector:
    app: sdkwork-knowledgebase
    component: background-worker
  ports:
    - name: health
      port: 18085
      targetPort: health

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sdkwork-knowledgebase-app-api
  labels:
    app: sdkwork-knowledgebase
    component: app-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sdkwork-knowledgebase
      component: app-api
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-knowledgebase-app-api
  labels:
    app: sdkwork-knowledgebase
    component: app-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sdkwork-knowledgebase
      component: app-api
  template:
    metadata:
      labels:
        app: sdkwork-knowledgebase
        component: app-api
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app-api
          image: registry.sdkwork.com/apps/sdkwork-knowledgebase/api:0.1.0
          env:
            - name: SDKWORK_KNOWLEDGEBASE_APPLICATION_PUBLIC_INGRESS_BIND
              value: 0.0.0.0:8080
            - name: SDKWORK_KNOWLEDGEBASE_ENVIRONMENT
              value: production
            - name: SDKWORK_NODE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_INTERNAL_API_INGRESS_TOKEN_FILE
              value: /run/secrets/sdkwork/drive-internal-api-ingress-token
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_CALLBACK_URL
              value: https://knowledgebase.sdkwork.com/internal/v3/api/knowledgebase/drive_events
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_SIGNING_SECRET_FILE
              value: /run/secrets/sdkwork/drive-event-signing/current
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_CHANNEL_TTL_SECONDS
              value: "86400"
            - name: SDKWORK_KNOWLEDGEBASE_DRIVE_EVENT_CALLER_APP_ID
              value: sdkwork-drive
          envFrom:
            - secretRef:
                name: sdkwork-knowledgebase-runtime
            - configMapRef:
                name: sdkwork-knowledgebase-topology
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: drive-internal-api-ingress-token
              mountPath: /run/secrets/sdkwork/drive-internal-api-ingress-token
              subPath: ingress-token
              readOnly: true
            - name: drive-event-signing-master
              mountPath: /run/secrets/sdkwork/drive-event-signing
              readOnly: true
      volumes:
        - name: drive-internal-api-ingress-token
          secret:
            secretName: sdkwork-knowledgebase-drive-internal-api
        - name: drive-event-signing-master
          secret:
            secretName: sdkwork-knowledgebase-drive-events
---
apiVersion: v1
kind: Service
metadata:
  name: sdkwork-knowledgebase-app-api
  labels:
    app: sdkwork-knowledgebase
    component: app-api
spec:
  selector:
    app: sdkwork-knowledgebase
    component: app-api
  ports:
    - name: http
      port: 80
      targetPort: http

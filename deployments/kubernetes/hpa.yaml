apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sdkwork-knowledgebase-worker
  labels:
    app: sdkwork-knowledgebase
    component: background-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sdkwork-knowledgebase-worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metric: outbox pending depth per pod (requires prometheus-adapter).
    # Drives scale-up when ingestion backlog accumulates.
    - type: Pods
      pods:
        metric:
          name: sdkwork_knowledgebase_outbox_pending
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
      selectPolicy: Min

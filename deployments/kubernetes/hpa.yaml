apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sdkwork-knowledgebase-app-api
  labels:
    app: sdkwork-knowledgebase
    component: app-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sdkwork-knowledgebase-app-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---

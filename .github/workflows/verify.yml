name: verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  phase1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run Phase 1 verification
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tools/verify_phase1.ps1

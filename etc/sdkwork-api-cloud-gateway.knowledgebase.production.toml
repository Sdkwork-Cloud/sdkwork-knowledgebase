mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "127.0.0.1:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-knowledgebase-app-api"
workspace = "sdkwork-knowledgebase"
sdkFamily = "sdkwork-knowledgebase-app-sdk"
apiAuthority = "sdkwork-knowledgebase-standalone-gateway"
surface = "app"
apiPrefix = "/app/v3/api/knowledgebase"
runtimeMode = "gateway"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_KNOWLEDGEBASE_APPLICATION_PUBLIC_HTTP_URL"
coverage = "knowledgebase-app-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-knowledgebase-backend-api"
workspace = "sdkwork-knowledgebase"
sdkFamily = "sdkwork-knowledgebase-backend-sdk"
apiAuthority = "sdkwork-knowledgebase-standalone-gateway"
surface = "backend"
apiPrefix = "/backend/v3/api/knowledgebase"
runtimeMode = "gateway"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_KNOWLEDGEBASE_APPLICATION_BACKEND_HTTP_URL"
coverage = "knowledgebase-backend-api-upstream-routes"

[[dependencySurfaces]]
serviceId = "sdkwork-knowledgebase-open-api"
workspace = "sdkwork-knowledgebase"
sdkFamily = "sdkwork-knowledgebase-open-sdk"
apiAuthority = "sdkwork-knowledgebase-standalone-gateway"
surface = "open"
apiPrefix = "/knowledgebase/v3/api"
runtimeMode = "gateway"
sameOriginAllowed = true
requiredBaseUrlKey = "SDKWORK_KNOWLEDGEBASE_APPLICATION_OPEN_HTTP_URL"
coverage = "knowledgebase-open-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-knowledgebase-app-api"
baseUrl = "http://127.0.0.1:18081"

[[upstreams]]
serviceId = "sdkwork-knowledgebase-backend-api"
baseUrl = "http://127.0.0.1:18081"

[[upstreams]]
serviceId = "sdkwork-knowledgebase-open-api"
baseUrl = "http://127.0.0.1:18081"

[cors]
allowAnyOrigin = true
allowedOrigins = []

[request]
maxBodyBytes = 33554432
timeoutMs = 0

[readiness]
checkUpstreams = false
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = false
metricsPath = "/metrics"
tracingEnabled = false
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = []
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = false

[security.waf]
enabled = false
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = false
compatXRateLimitHeaders = true
globalMaxInFlight = 1024
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = false
maxAttempts = 1
retryStatuses = [502, 503, 504]
retryBackoffMs = 0
circuitBreakerEnabled = false
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
